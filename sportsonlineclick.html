<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sports Live Streams</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .subtitle {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .search-section {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .search-box {
            width: 100%;
            padding: 15px 20px;
            font-size: 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            transition: all 0.3s ease;
        }

        .search-box:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .stats {
            margin-top: 15px;
            color: #666;
            font-size: 14px;
        }

        .matches-grid {
            display: grid;
            gap: 20px;
        }

        .match-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .match-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
        }

        .match-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .match-details {
            flex: 1;
        }

        .match-time {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .match-title {
            font-size: 1.3em;
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
        }

        .match-league {
            color: #666;
            font-size: 14px;
        }

        .button-group {
            display: flex;
            gap: 10px;
        }

        .watch-btn, .copy-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .watch-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .watch-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .copy-btn {
            background: #f0f0f0;
            color: #333;
        }

        .copy-btn:hover {
            background: #e0e0e0;
            transform: scale(1.05);
        }

        .copy-btn.copied {
            background: #4caf50;
            color: white;
        }

        .loading {
            text-align: center;
            color: white;
            font-size: 1.2em;
            padding: 50px;
        }

        .error {
            background: #f44336;
            color: white;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 20px;
        }

        .no-results {
            text-align: center;
            color: white;
            font-size: 1.2em;
            padding: 50px;
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .spinner {
            border: 4px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top: 4px solid white;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #333;
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            z-index: 1000;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.8em;
            }
            
            .match-info {
                flex-direction: column;
                align-items: stretch;
            }
            
            .button-group {
                justify-content: stretch;
            }
            
            .watch-btn, .copy-btn {
                flex: 1;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏃 Sports Live Streams</h1>
            <p class="subtitle">Watch your favorite sports events live</p>
        </div>

        <div class="search-section">
            <input type="text" class="search-box" id="searchInput" placeholder="🔍 Search by team name, league, or event...">
            <div class="stats" id="stats"></div>
        </div>

        <div id="content">
            <div class="loading">
                <div class="spinner"></div>
                Loading matches...
            </div>
        </div>
    </div>

    <script>
        // CORS proxies (trying multiple in case one fails)
        const CORS_PROXIES = [
            'https://cors.eu.org/',
            'https://cors-anywhere.herokuapp.com/',
            'https://thingproxy.freeboard.io/fetch/'
        ];

        const API_URL = 'https://sportsonline.vc/prog.txt';
        
        let allMatches = [];
        let currentProxyIndex = 0;

        function showToast(message, isError = false) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            if (isError) {
                toast.style.background = '#f44336';
            }
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        async function fetchWithCORS(url, proxyIndex = 0) {
            if (proxyIndex >= CORS_PROXIES.length) {
                throw new Error('All CORS proxies failed');
            }
            
            try {
                const proxyUrl = CORS_PROXIES[proxyIndex] + encodeURIComponent(url);
                const response = await fetch(proxyUrl);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                return await response.text();
            } catch (error) {
                console.warn(`Proxy ${proxyIndex + 1} failed:`, error);
                return fetchWithCORS(url, proxyIndex + 1);
            }
        }

        function getDateForWeekday(dayName, today) {
            const weekdays = ["SUNDAY","MONDAY","TUESDAY","WEDNESDAY","THURSDAY","FRIDAY","SATURDAY"];
            const dayIndex = weekdays.indexOf(dayName.toUpperCase());
            if (dayIndex === -1) return null;

            const result = new Date(today);
            const diff = (dayIndex - today.getDay() + 7) % 7;
            result.setDate(today.getDate() + diff);

            return result.toLocaleDateString("en-GB", {
                day: "2-digit",
                month: "short"
            }).replace(/ /g, "");
        }

        function parseMatches(data) {
            const lines = data.split("\n");
            const today = new Date();
            const weekdays = ["SUNDAY","MONDAY","TUESDAY","WEDNESDAY","THURSDAY","FRIDAY","SATURDAY"];
            
            let currentDay = null;
            const matches = [];

            const regex = /^(\d{2}:\d{2})\s+(.+?)\s+\|\s+(https?:\/\/[^\s]+\.php)$/;

            for (const line of lines) {
                const trimmedLine = line.trim();
                if (!trimmedLine) continue;
                
                const dayName = trimmedLine.toUpperCase();
                
                if (weekdays.includes(dayName)) {
                    currentDay = getDateForWeekday(dayName, today);
                    continue;
                }

                const match = line.match(regex);
                if (match && currentDay) {
                    const time = match[1];
                    const title = match[2].trim();
                    const url = match[3];
                    
                    matches.push({
                        time: time,
                        title: title,
                        url: url,
                        date: currentDay,
                        id: Date.now() + Math.random() * 1000
                    });
                }
            }
            
            return matches;
        }

        async function fetchMatches() {
            const contentDiv = document.getElementById('content');
            
            try {
                console.log('Fetching data from API...');
                const data = await fetchWithCORS(API_URL);
                console.log('Data received, parsing...');
                
                allMatches = parseMatches(data);
                
                if (allMatches.length === 0) {
                    contentDiv.innerHTML = `
                        <div class="error">
                            ⚠️ No matches found in the data. The API format might have changed.
                        </div>
                    `;
                    document.getElementById('stats').innerHTML = '0 matches found';
                    return;
                }
                
                console.log(`Parsed ${allMatches.length} matches`);
                displayMatches(allMatches);
                updateStats(allMatches.length);
                
            } catch (error) {
                console.error('Error:', error);
                contentDiv.innerHTML = `
                    <div class="error">
                        ❌ Failed to load matches. Please check your connection or try again later.<br>
                        <small>Error: ${error.message}</small>
                    </div>
                `;
                showToast('Failed to load matches', true);
            }
        }

        function displayMatches(matches) {
            const contentDiv = document.getElementById('content');
            
            if (matches.length === 0) {
                contentDiv.innerHTML = '<div class="no-results">🔍 No matches found matching your search</div>';
                return;
            }
            
            const matchesHtml = `
                <div class="matches-grid">
                    ${matches.map(match => `
                        <div class="match-card" data-match-id="${match.id}">
                            <div class="match-info">
                                <div class="match-details">
                                    <div class="match-time">${match.date} • ${match.time}</div>
                                    <div class="match-title">${escapeHtml(match.title)}</div>
                                </div>
                                <div class="button-group">
                                    <button class="watch-btn" onclick="window.open('${match.url}', '_blank')">
                                        ▶ Watch Live
                                    </button>
                                    <button class="copy-btn" onclick="copyToClipboard('${match.url}', this)">
                                        📋 Copy Link
                                    </button>
                                </div>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
            
            contentDiv.innerHTML = matchesHtml;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function updateStats(total) {
            const searchTerm = document.getElementById('searchInput').value;
            if (searchTerm) {
                const filteredCount = allMatches.filter(match => 
                    match.title.toLowerCase().includes(searchTerm.toLowerCase())
                ).length;
                document.getElementById('stats').innerHTML = `📊 Showing ${filteredCount} of ${total} matches`;
            } else {
                document.getElementById('stats').innerHTML = `📊 Total matches: ${total}`;
            }
        }

        function copyToClipboard(text, button) {
            navigator.clipboard.writeText(text).then(() => {
                const originalText = button.textContent;
                button.textContent = '✓ Copied!';
                button.classList.add('copied');
                showToast('Link copied to clipboard! ✅');
                
                setTimeout(() => {
                    button.textContent = originalText;
                    button.classList.remove('copied');
                }, 2000);
            }).catch(err => {
                console.error('Failed to copy:', err);
                showToast('Failed to copy link', true);
            });
        }

        function searchMatches() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            
            if (!searchTerm) {
                displayMatches(allMatches);
                updateStats(allMatches.length);
                return;
            }
            
            const filtered = allMatches.filter(match => 
                match.title.toLowerCase().includes(searchTerm)
            );
            
            displayMatches(filtered);
            updateStats(allMatches.length);
        }

        // Debounce search for better performance
        let searchTimeout;
        document.getElementById('searchInput').addEventListener('input', (e) => {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                searchMatches();
            }, 300);
        });

        // Initial fetch
        fetchMatches();
    </script>
</body>
</html>
