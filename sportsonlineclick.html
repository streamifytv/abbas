<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sports Event Registry</title>
    <style>
        :root {
            --bg-color: #1e1e2e;
            --table-bg: #2b2b3b;
            --border-color: #44475a;
            --text-main: #f8f8f2;
            --text-dim: #9499b8;
            --accent: #bd93f9;
            --hover: #38384d;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Cascadia Code', 'Fira Code', 'Segoe UI Mono', monospace;
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 20px;
            line-height: 1.5;
        }

        .container { max-width: 1100px; margin: 0 auto; }

        .header { margin-bottom: 25px; border-left: 4px solid var(--accent); padding-left: 15px; }
        h1 { font-size: 1.5rem; letter-spacing: -0.5px; }
        .subtitle { color: var(--text-dim); font-size: 0.9rem; }

        .search-section { margin-bottom: 20px; }
        .search-box {
            width: 100%;
            background: var(--table-bg);
            border: 1px solid var(--border-color);
            padding: 12px;
            color: var(--text-main);
            border-radius: 4px;
            font-family: inherit;
        }

        /* Table Style - JSON Tree Look */
        .table-container {
            background: var(--table-bg);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }

        th {
            background: rgba(0,0,0,0.2);
            text-align: left;
            padding: 12px 15px;
            color: var(--accent);
            text-transform: uppercase;
            font-size: 0.75rem;
            border-bottom: 1px solid var(--border-color);
        }

        td {
            padding: 10px 15px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            vertical-align: middle;
        }

        tr:hover { background-color: var(--hover); }

        .col-time { width: 150px; color: var(--text-dim); }
        .col-event { font-weight: 500; }
        .col-link { color: var(--accent); max-width: 300px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 0.8rem; opacity: 0.7; }
        .col-copy { width: 50px; text-align: center; }

        .copy-icon {
            cursor: pointer;
            padding: 5px;
            border-radius: 4px;
            transition: all 0.2s;
            display: inline-block;
            background: transparent;
            border: none;
            color: var(--text-dim);
            font-size: 1.1rem;
        }

        .copy-icon:hover { color: var(--text-main); background: rgba(255,255,255,0.1); }
        .copy-icon.success { color: #50fa7b; }

        .loading, .error, .no-results {
            padding: 40px;
            text-align: center;
            color: var(--text-dim);
        }

        .stats { margin-top: 10px; font-size: 0.75rem; color: var(--text-dim); }

        @media (max-width: 768px) {
            .col-link { display: none; }
            th:nth-child(3), td:nth-child(3) { display: none; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>STREAM_REGISTRY_V2</h1>
        <p class="subtitle">Index of active sports event endpoints</p>
    </div>

    <div class="search-section">
        <input type="text" class="search-box" id="searchInput" placeholder="Filter events by name or keyword...">
        <div class="stats" id="stats">Initializing data...</div>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Time (UTC)</th>
                    <th>Event Name</th>
                    <th>Source Link</th>
                    <th>Copy</th>
                </tr>
            </thead>
            <tbody id="eventTableBody">
                </tbody>
        </table>
        <div id="statusMessage"></div>
    </div>
</div>

<script>
    const API_URL = 'https://sportsonline.vc/prog.txt';
    const CORS_PROXIES = [
        'https://cors.eu.org/',
        'https://cors-anywhere.herokuapp.com/',
        'https://thingproxy.freeboard.io/fetch/'
    ];
    let allMatches = [];

    async function fetchData() {
        const tbody = document.getElementById('eventTableBody');
        const status = document.getElementById('statusMessage');
        status.innerHTML = '<div class="loading">Fetching remote registry...</div>';

        try {
            const response = await fetch(CORS_PROXIES[0] + encodeURIComponent(API_URL));
            if (!response.ok) throw new Error('Network error');
            const data = await response.text();
            
            allMatches = parseMatches(data);
            renderTable(allMatches);
            status.innerHTML = '';
            updateStats(allMatches.length);
        } catch (err) {
            status.innerHTML = `<div class="error">Failed to synchronize: ${err.message}</div>`;
        }
    }

    function parseMatches(data) {
        const lines = data.split("\n");
        const weekdays = ["SUNDAY","MONDAY","TUESDAY","WEDNESDAY","THURSDAY","FRIDAY","SATURDAY"];
        let currentDay = "Today";
        const matches = [];
        const regex = /^(\d{2}:\d{2})\s+(.+?)\s+\|\s+(https?:\/\/[^\s]+)$/;

        lines.forEach(line => {
            const trimmed = line.trim();
            if (!trimmed) return;
            if (weekdays.includes(trimmed.toUpperCase())) {
                currentDay = trimmed.charAt(0) + trimmed.slice(1).toLowerCase();
                return;
            }
            const match = trimmed.match(regex);
            if (match) {
                matches.push({
                    time: `${currentDay} ${match[1]}`,
                    title: match[2].trim(),
                    url: match[3]
                });
            }
        });
        return matches;
    }

    function renderTable(data) {
        const tbody = document.getElementById('eventTableBody');
        if (data.length === 0) {
            tbody.innerHTML = '<tr><td colspan="4" class="no-results">No records found.</td></tr>';
            return;
        }

        tbody.innerHTML = data.map(item => `
            <tr>
                <td class="col-time">${item.time}</td>
                <td class="col-event">${escapeHtml(item.title)}</td>
                <td class="col-link">${item.url}</td>
                <td class="col-copy">
                    <button class="copy-icon" onclick="copyLink('https://sportzys.pages.dev/iframe?url=${item.url}', this)" title="Copy Link">
                     &#128203;
                    </button>
                </td>
            </tr>
        `).join('');
    }

    function copyLink(url, btn) {
        navigator.clipboard.writeText(url).then(() => {
            const original = btn.textContent;
            btn.textContent = 'Ã¢ÂÂ';
            btn.classList.add('success');
            setTimeout(() => {
                btn.textContent = 'Ã°ÂÂÂ';
                btn.classList.remove('success');
            }, 1500);
        });
    }

    function escapeHtml(str) {
        return str.replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
    }

    function updateStats(total) {
        document.getElementById('stats').textContent = `[ STATUS: OK ] [ RECORDS: ${total} ]`;
    }

    document.getElementById('searchInput').addEventListener('input', (e) => {
        const val = e.target.value.toLowerCase();
        const filtered = allMatches.filter(m => m.title.toLowerCase().includes(val));
        renderTable(filtered);
    });

    fetchData();
</script>

</body>
</html>
