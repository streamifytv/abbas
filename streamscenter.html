<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Streams.center</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #070a12; font-family: 'Inter', system-ui, -apple-system, sans-serif; color: #eef2ff; padding: 1rem 0.8rem; }

.dashboard { max-width: 1600px; margin: 0 auto; }

.hero { margin-bottom: 1rem; display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; gap: 0.8rem; border-bottom: 1px solid rgba(255, 255, 255, 0.05); padding-bottom: 0.75rem; }

.title-section h1 { font-weight: 700; font-size: 1.25rem; letter-spacing: -0.2px; background: linear-gradient(135deg, #ffffff, #9aafff); background-clip: text; -webkit-background-clip: text; color: transparent; display: inline-flex; align-items: center; gap: 6px; }

.title-section p { font-size: 0.65rem; color: #7e86a8; margin-top: 0.2rem; }

.stats-badge { background: #0f1320; padding: 0.25rem 0.9rem; border-radius: 40px; font-size: 0.7rem; font-weight: 500; border: 1px solid #252c44; color: #b9c3ff; }

.control-panel { margin: 0.8rem 0 1rem 0; display: flex; flex-wrap: wrap; gap: 0.6rem; align-items: center; justify-content: space-between; }

.search-wrapper { flex: 2; min-width: 180px; position: relative; }

.search-wrapper i { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); font-size: 0.75rem; color: #6f7aa8; }

#searchInput { width: 100%; background: #0c0f18; border: 1px solid #23283e; border-radius: 32px; padding: 0.5rem 0.8rem 0.5rem 2.2rem; font-size: 0.75rem; color: #f0f3fc; outline: none; transition: 0.15s; font-family: 'Inter', monospace; }

#searchInput:focus { border-color: #6a7eff; box-shadow: 0 0 0 2px rgba(106, 126, 255, 0.2); background: #080b14; }

.btn-group { display: flex; gap: 8px; flex-wrap: wrap; }

.action-btn { background: #101424; border: 1px solid #262e4a; padding: 0 1rem; height: 32px; border-radius: 32px; font-weight: 500; font-size: 0.7rem; color: #ccd6ff; cursor: pointer; font-family: inherit; display: inline-flex; align-items: center; gap: 5px; transition: 0.15s; }
.action-btn:hover { background: #1a2140; border-color: #6a7eff; }

.table-container { background: #0a0e18; border-radius: 18px; border: 1px solid #181e30; overflow-x: auto; box-shadow: 0 8px 20px -8px rgba(0, 0, 0, 0.6); }

.schedule-table { width: 100%; border-collapse: collapse; font-size: 0.7rem; min-width: 900px; }

.schedule-table th { text-align: left; padding: 0.7rem 0.8rem; background: #060910; font-weight: 600; color: #a7b2e0; border-bottom: 1px solid #1a2038; text-transform: uppercase; font-size: 0.65rem; letter-spacing: 0.3px; }

.schedule-table td { padding: 0.7rem 0.8rem; border-bottom: 1px solid #12172a; vertical-align: middle; }

.schedule-table tr:hover td { background: #0f1322; }

.team-matchup { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

.team-pill { display: flex; align-items: center; gap: 5px; background: rgba(6, 10, 22, 0.6); padding: 2px 8px 2px 5px; border-radius: 30px; border: 1px solid #262e48; }

.team-logo { width: 22px; height: 22px; object-fit: contain; border-radius: 22px; background: #0a0f1c; }

.vs-badge { font-weight: 700; font-size: 0.6rem; background: #181f36; padding: 2px 6px; border-radius: 16px; color: #aebeff; }

.match-name-sub { font-size: 0.6rem; color: #7b86b0; margin-left: 2px; }

.time-primary { background: #0b0f1c; border-radius: 24px; padding: 3px 8px; font-family: monospace; font-size: 0.65rem; font-weight: 500; border: 0.5px solid #2a3150; display: inline-block; }

.category-badge { background: #131b30; border-radius: 20px; padding: 3px 8px; font-size: 0.6rem; font-weight: 600; display: inline-block; color: #bfcbff; }

.sources-container { display: flex; flex-direction: column; gap: 5px; transition: max-height 0.25s ease; }
.sources-container.collapsed { max-height: 0; overflow: hidden; }
.sources-container.expanded { max-height: 1000px; overflow: visible; }

.source-item { display: flex; align-items: center; justify-content: space-between; background: #0c1020; border-radius: 32px; padding: 3px 6px 3px 12px; border: 1px solid #232a44; gap: 8px; flex-wrap: wrap; }

.source-url { font-size: 0.65rem; font-family: 'SF Mono', monospace; color: #b9c3ff; word-break: break-all; flex: 2; min-width: 140px; }

.lang-badge { background: #1a2140; border-radius: 24px; padding: 2px 8px; font-size: 0.6rem; font-weight: 500; color: #d3deff; display: inline-flex; align-items: center; gap: 3px; }

.copy-single-btn { background: #151e38; border: none; border-radius: 30px; padding: 3px 10px; font-size: 0.6rem; font-weight: 500; color: #d2deff; cursor: pointer; font-family: inherit; display: inline-flex; align-items: center; gap: 4px; transition: 0.1s; }
.copy-single-btn:hover { background: #2a3460; color: white; }

.toast-msg { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #1e2548; backdrop-filter: blur(12px); color: #dbe4ff; padding: 5px 16px; border-radius: 40px; font-size: 0.7rem; font-weight: 500; border: 1px solid #6a7eff; z-index: 1000; pointer-events: none; }

.empty-state, .error-state { text-align: center; padding: 1.8rem; font-size: 0.75rem; color: #7b86b0; }

.loading-spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid #2e3a60; border-top-color: #8f9eff; border-radius:50%; animation: spin 0.6s linear infinite; margin-right: 6px; }
@keyframes spin { to { transform: rotate(360deg); } }

footer { margin-top: 1rem; text-align: center; font-size: 0.6rem; color: #404768; }

@media (max-width: 680px) {
  .team-matchup { gap: 5px; }
  .source-item { flex-direction: column; align-items: stretch; }
  .copy-single-btn { align-self: flex-end; }
  .schedule-table td, .schedule-table th { padding: 0.6rem 0.5rem; }
}
</style>
</head>
<body>
<div class="dashboard">
  <div class="hero">
    <div class="title-section">
      <h1><i class="fas fa-bolt" style="font-size: 0.9rem;"></i>Streams.center</h1>
      <p>multi‑lang streams · compact table</p>
    </div>
    <div class="stats-badge" id="statsCount"><i class="fas fa-calendar"></i> —</div>
  </div>

  <div class="control-panel">
    <div class="search-wrapper">
      <i class="fas fa-search"></i>
      <input type="text" id="searchInput" placeholder="team, match, league...">
    </div>
    <div class="btn-group">
      <button class="action-btn" id="refreshBtn"><i class="fas fa-sync-alt"></i> sync</button>
      <button class="action-btn" id="resetSearchBtn"><i class="fas fa-undo-alt"></i> reset</button>
      <button class="action-btn" id="copyAllBtn"><i class="fas fa-copy"></i> copy all</button>
      <button class="action-btn" id="toggleSourcesBtn"><i class="fas fa-compress-alt"></i> toggle sources</button>
    </div>
  </div>

  <div class="table-container">
    <table class="schedule-table" id="scheduleTable">
      <thead>
        <tr><th>matchup</th><th>sport</th><th>time (local)</th><th>sources + lang</th></tr>
      </thead>
      <tbody id="tableBody">
        <tr><td colspan="4" class="empty-state"><span class="loading-spinner"></span> loading schedule...</td></tr>
      </tbody>
    </table>
  </div>

  <footer><i class="fas fa-code"></i> each source parsed as URL&lt;Language · copy any link</footer>
</div>

<script>
const API_URL = "https://backend.streamcenter.live/api/Parties?";
const FETCH_OPTIONS = { method: "GET", headers: { "Accept": "application/json" } };

let allGames = [];
let filteredGames = [];
let sourcesCollapsed = false;

// --- Helper: Fetch Direct M3U8 ---
// Added async/await and clipboard integration
async function copyDirectStream(id, lang) {
  showToast("Fetching direct link...");
  try {
    // Using your proxy logic
    const response = await fetch('https://cors.eu.org/'+id);
    const data = await response.text();
    const match = data.match(/\?stream=([^"]+)/);

    if (match && match[1]) {
      const streamUrl = `https://mainstreams.pro/hls/${match[1]}.m3u8?|Referer=https://streamscenter.online/`;
      navigator.clipboard.writeText(streamUrl);
      showToast(`✓ ${lang} Direct link copied!`);
    } else {
      showToast("⚠️ Could not find stream ID");
    }
  } catch (error) {
    console.error("Error fetching data:", error);
    showToast("⚠️ Network error");
  }
}

function parseSourceList(raw) {
  if (!raw) return [];
  let segments = raw.split(/[;\n,]+/).map(s => s.trim()).filter(s => s.length);
  const result = [];
  for (let seg of segments) {
    if (seg.includes("<")) {
      let lastIdx = seg.lastIndexOf("<");
      let url = seg.substring(0, lastIdx).trim();
      let language = seg.substring(lastIdx + 1).trim();
      result.push({ url, language: language || "stream" });
    } else {
      let langGuess = seg.toLowerCase().includes("arabic") ? "Arabic" : (seg.toLowerCase().includes("english") ? "English" : "stream");
      result.push({ url: seg, language: langGuess });
    }
  }
  return result;
}

function extractTeams(game) {
  let teamA = "Home", teamB = "Away";
  if (game.name && game.name.includes(" vs ")) {
    [teamA, teamB] = game.name.split(" vs ");
  }
  return { teamA, teamB, logo1: game.logoTeam1 || "", logo2: game.logoTeam2 || "" };
}

function formatTimeRange(startISO, endISO) {
  let start = new Date(startISO);
  let end = new Date(endISO);
  if (isNaN(start)) return { start: "—", end: "" };
  const opts = { month: 'short', day: 'numeric', hour: '2-digit', minute:'2-digit' };
  return { start: start.toLocaleString(undefined, opts), end: end.toLocaleString(undefined, { hour:'2-digit', minute:'2-digit' }) };
}

function getCategory(catId) {
  const map = { 9: "⚽ soccer", 13: "⚾ mlb", 16: "🏒 nhl" };
  return map[catId] || `🏅 event`;
}

function showToast(msg) {
  const old = document.querySelector('.toast-msg');
  if (old) old.remove();
  const toast = document.createElement('div');
  toast.className = 'toast-msg';
  toast.style.cssText = "position:fixed; bottom:20px; right:20px; background:#333; color:#fff; padding:10px 20px; border-radius:5px; z-index:9999; transition: opacity 0.5s;";
  toast.innerHTML = `<i class="fas fa-info-circle"></i> ${msg}`;
  document.body.appendChild(toast);
  setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 500); }, 2500);
}

function renderTable() {
  const tbody = document.getElementById("tableBody");
  if (!tbody) return;
  
  if (filteredGames.length === 0) {
    tbody.innerHTML = `<tr><td colspan="4" class="empty-state">✨ no matches — try another keyword</td></tr>`;
    document.getElementById("statsCount").textContent = `📋 0 / ${allGames.length}`;
    return;
  }

  let html = "";
  for (let game of filteredGames) {
    const time = formatTimeRange(game.beginPartie, game.endPartie);
    const { teamA, teamB, logo1, logo2 } = extractTeams(game);
    let sources = parseSourceList(game.videoUrl || '');
    
    let sourcesHtml = `<div class="sources-container ${sourcesCollapsed ? 'collapsed' : 'expanded'}">`;
    
    sources.forEach((src) => {
      let langIcon = src.language.toLowerCase().includes("arabic") ? "🇸🇦" : (src.language.toLowerCase().includes("english") ? "🇬🇧" : "🔗");
      
      // Extract numeric ID from URL if it exists
      const streamIdMatch = src.url.match(/ch(\d+)/) || [null, src.url];
      const streamId = streamIdMatch[1];

      sourcesHtml += `
      <div class="source-item">
        <span class="lang-badge">${langIcon} ${src.language}</span>
        <div class="btn-group">
          <button class="copy-single-btn" onclick="copyDirectStream('${src.url}', '${src.language}')">Direct</button>
          <button class="copy-single-btn" onclick="navigator.clipboard.writeText('${src.url}')">Embed</button>
        </div>
      </div>`;
    });
    
    sourcesHtml += `</div>`;
    html += `<tr>
      <td>
        <div class="team-matchup">
          <div class="team-pill">${logo1 ? `<img class="team-logo" src="${logo1}">` : `<i class="fas fa-flag"></i>`}<span>${teamA}</span></div>
          <span class="vs-badge">vs</span>
          <div class="team-pill">${logo2 ? `<img class="team-logo" src="${logo2}">` : `<i class="fas fa-flag"></i>`}<span>${teamB}</span></div>
        </div>
      </td>
      <td><span class="category-badge">${getCategory(game.categoryId)}</span></td>
      <td><span class="time-primary">${time.start}</span><br><span style="font-size:0.6rem; color:#8f99c2;">→ ${time.end}</span></td>
      <td>${sourcesHtml}</td>
    </tr>`;
  }
  tbody.innerHTML = html;
  document.getElementById("statsCount").textContent = `📅 ${filteredGames.length} / ${allGames.length}`;
}

async function fetchSchedule() {
  const tbody = document.getElementById("tableBody");
  tbody.innerHTML = `<tr><td colspan="4" class="empty-state">fetching schedule...</td></tr>`;
  try {
    const res = await fetch(API_URL, FETCH_OPTIONS);
    const data = await res.json();
    allGames = Array.isArray(data) ? data : [];
    filteredGames = [...allGames];
    renderTable();
  } catch (err) {
    tbody.innerHTML = `<tr><td colspan="4" class="error-state">⚠️ failed to fetch schedule</td></tr>`;
  }
}

// Search & Listeners
document.getElementById("searchInput").addEventListener("input", (e) => {
  const query = e.target.value.toLowerCase().trim();
  filteredGames = allGames.filter(game => 
    game.name?.toLowerCase().includes(query) || 
    getCategory(game.categoryId).toLowerCase().includes(query)
  );
  renderTable();
});

document.getElementById("refreshBtn").addEventListener("click", fetchSchedule);
document.getElementById("toggleSourcesBtn").addEventListener("click", () => {
  sourcesCollapsed = !sourcesCollapsed;
  renderTable();
});

fetchSchedule();

</script>
</body>
</html>
